name: 0Waste Build APK (Production)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Production APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Web Asset Build (Production)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AI_PROVIDER: gemini
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android Unsigned Release APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign Android APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_CONTENT }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename Signed APK
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} android/app/build/outputs/apk/release/0Waste-Production-v1.apk

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: 0Waste-Production-Signed-APK
          path: android/app/build/outputs/apk/release/0Waste-Production-v1.apk
          retention-days: 7
