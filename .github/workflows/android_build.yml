name: 🏗️ 0Waste Android Production Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_ENV: production
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build:
    name: Build & Sign Production APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📱 Setup Android SDK 35
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: 📦 Install Dependencies
        run: |
          echo "::group::NPM Install"
          rm -f package-lock.json
          npm install --prefer-offline --no-audit
          echo "::endgroup::"
        continue-on-error: false

      - name: ✅ Verify Dependencies
        run: |
          echo "::group::Verify Vite Installation"
          npx vite --version
          echo "::endgroup::"
          
          echo "::group::Verify Plugin Installation"
          npm ls @vitejs/plugin-react @tailwindcss/vite @vitejs/plugin-legacy
          echo "::endgroup::"
          
          echo "::group::Verify Capacitor CLI"
          npx cap --version
          echo "::endgroup::"

      - name: 🛠️ Build Web Assets (Production)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AI_PROVIDER: gemini
          CI: true
        continue-on-error: false

      - name: 📊 Check Build Output
        run: |
          echo "::group::Build Output Structure"
          if [ -d "dist" ]; then
            echo "✓ dist directory exists"
            du -sh dist/
            find dist -maxdepth 1 -type f -o -type d | head -20
          else
            echo "✗ dist directory NOT found"
            exit 1
          fi
          echo "::endgroup::"

      - name: 🔄 Capacitor Sync
        run: |
          echo "::group::Capacitor Sync"
          npx cap sync android
          echo "::endgroup::"
        continue-on-error: false

      - name: 🔨 Build Android APK (Release)
        working-directory: android
        run: |
          echo "::group::Gradle Build"
          chmod +x gradlew
          ./gradlew assembleRelease \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx2048m"
          echo "::endgroup::"
        continue-on-error: false

      - name: 📦 Verify APK Generation
        run: |
          echo "::group::APK Verification"
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            echo "✓ APK generated successfully"
            ls -lh android/app/build/outputs/apk/release/app-release-unsigned.apk
          else
            echo "✗ APK NOT found"
            echo "Available outputs:"
            find android/app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
          echo "::endgroup::"

      - name: 🚀 Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: 0Waste-Production-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
          compression-level: 9

      - name: 📧 Notify on Failure
        if: failure()
        run: |
          echo "::error::Build failed! Check logs above for details."
          exit 1
